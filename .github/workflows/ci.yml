name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GeneaPam.slnx

      - name: Build
        run: dotnet build GeneaPam.slnx --no-incremental --no-restore

      - name: Format check
        run: dotnet format GeneaPam.slnx --verify-no-changes
